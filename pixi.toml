[workspace]
authors = ["maniac1um"]
channels = ["conda-forge"]
description = "Autonomous research paper reproduction pipeline"
name = "man1lab"
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
version = "1.0.0"

[dependencies]
python = "3.12.*"

[pypi-dependencies]
pydantic = ">=2.0"
pymupdf = ">=1.24.0"
docling = ">=2.0.0"
openai = ">=1.0.0"
anthropic = ">=0.40.0"
python-dotenv = ">=1.0.0"
hydra-core = ">=1.3.0"
mlflow = ">=2.0.0"
httpx = ">=0.28.0"
typer = ">=0.15.0"

[feature.dev]
pypi-dependencies = { pytest = ">=8.0", pip = ">=24.0", build = ">=1.0" }

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
run = { cmd = "python app.py", env = { PYTHONPATH = "." } }
man1lab = { cmd = "python -m man1lab", env = { PYTHONPATH = "." } }
test = { cmd = "python -m pytest tests/ -v", env = { PYTHONPATH = "." } }
integration = { cmd = "python scripts/run_integration_m7_1.py", env = { PYTHONPATH = "." } }
